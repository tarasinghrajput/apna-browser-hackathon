<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apna Browser - Homepage</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        .container {
            max-width: 800px;
            width: 100%;
            text-align: center;
        }

        .logo {
            font-size: 48px;
            font-weight: bold;
            color: white;
            margin-bottom: 40px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .search-box {
            background: white;
            border-radius: 30px;
            padding: 15px 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            margin-bottom: 40px;
            display: flex;
            gap: 10px;
        }

        .search-input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 16px;
            padding: 5px;
        }

        .search-btn {
            background: #4a90e2;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: background 0.2s;
        }

        .search-btn:hover {
            background: #357abd;
        }

        .quick-links {
            background: rgba(255,255,255,0.95);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .quick-links h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 24px;
        }

        .links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }

        .link-card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            text-decoration: none;
            color: #333;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 2px solid transparent;
        }

        .link-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            border-color: #4a90e2;
        }

        .link-icon {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .link-title {
            font-weight: 600;
            font-size: 14px;
        }

        .footer {
            color: white;
            margin-top: 40px;
            font-size: 14px;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🌐 Apna Browser</div>
        
        <div class="search-box">
            <input type="text" class="search-input" id="search-input" placeholder="Search the web or enter URL...">
            <button class="search-btn" id="search-btn">Search</button>
        </div>

        <div class="quick-links">
            <h2>Quick Links</h2>
            <div class="links-grid">
                <a href="https://www.wikipedia.org" class="link-card">
                    <div class="link-icon">📚</div>
                    <div class="link-title">Wikipedia</div>
                </a>
                <a href="https://www.youtube.com" class="link-card">
                    <div class="link-icon">▶️</div>
                    <div class="link-title">YouTube</div>
                </a>
                <a href="https://www.khanacademy.org" class="link-card">
                    <div class="link-icon">🎓</div>
                    <div class="link-title">Khan Academy</div>
                </a>
                <a href="https://www.github.com" class="link-card">
                    <div class="link-icon">💻</div>
                    <div class="link-title">GitHub</div>
                </a>
                <a href="https://stackoverflow.com" class="link-card">
                    <div class="link-icon">❓</div>
                    <div class="link-title">Stack Overflow</div>
                </a>
                <a href="https://www.coursera.org" class="link-card">
                    <div class="link-icon">🏫</div>
                    <div class="link-title">Coursera</div>
                </a>
                <a href="https://www.udemy.com" class="link-card">
                    <div class="link-icon">📖</div>
                    <div class="link-title">Udemy</div>
                </a>
                <a href="https://www.google.com" class="link-card">
                    <div class="link-icon">🔍</div>
                    <div class="link-title">Google</div>
                </a>
            </div>
        </div>

        <div class="footer">
            Built with ❤️ for Apna Browser Hackathon
        </div>
    </div>

    <script>
        const searchInput = document.getElementById('search-input');
        const searchBtn = document.getElementById('search-btn');

        function performSearch() {
            let query = searchInput.value.trim();
            if (!query) return;

            let url;
            if (query.includes('.') && !query.includes(' ')) {
                if (!query.startsWith('http://') && !query.startsWith('https://')) {
                    url = 'https://' + query;
                } else {
                    url = query;
                }
            } else {
                url = 'https://www.google.com/search?q=' + encodeURIComponent(query);
            }

            window.location.href = url;
        }

        searchBtn.addEventListener('click', performSearch);
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                performSearch();
            }
        });
    </script>
</body>
</html>
