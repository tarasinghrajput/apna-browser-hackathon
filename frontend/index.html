<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Apna Browser</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,500,0,0"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div id="browser-ui" class="browser-ui">
      <header class="tab-strip" aria-label="Tabs bar">
        <div class="window-dots" aria-hidden="true">
          <span class="dot dot-red"></span>
          <span class="dot dot-amber"></span>
          <span class="dot dot-green"></span>
        </div>

        <div id="tabs-list" class="tabs-list" role="tablist" aria-label="Open tabs"></div>

        <button id="new-tab-btn" class="icon-btn" type="button" aria-label="New tab">
          <span class="material-symbols-outlined">add</span>
        </button>
      </header>

      <header class="toolbar" aria-label="Navigation toolbar">
        <div class="nav-group">
          <button id="home-btn" class="icon-btn" type="button" aria-label="Go home">
            <span class="material-symbols-outlined">home</span>
          </button>
          <button id="back-btn" class="icon-btn" type="button" aria-label="Go back">
            <span class="material-symbols-outlined">arrow_back</span>
          </button>
          <button id="forward-btn" class="icon-btn" type="button" aria-label="Go forward">
            <span class="material-symbols-outlined">arrow_forward</span>
          </button>
          <button id="refresh-btn" class="icon-btn" type="button" aria-label="Refresh page">
            <span class="material-symbols-outlined">refresh</span>
          </button>
        </div>

        <div class="address-wrap">
          <span class="material-symbols-outlined lock-icon" aria-hidden="true">lock</span>
          <input
            id="url-input"
            class="url-input"
            type="text"
            autocomplete="off"
            placeholder="Search or enter address"
            aria-label="Search or enter address"
          />
          <button id="go-btn" class="go-btn" type="button" aria-label="Go to URL">Go</button>
        </div>
      </header>
    </div>

    <div id="content-area" class="content-area">
      <section id="home-content" class="home-content">
        <div class="hero-wrap">
          <p class="hero-kicker">Learn as you browse</p>
          <h1>Apna Browser</h1>
          <p class="hero-subtitle">The developer's gateway to the web</p>

          <form id="search-form" class="hero-search" aria-label="Homepage search">
            <span class="material-symbols-outlined" aria-hidden="true">search</span>
            <input
              id="search-input"
              type="search"
              autocomplete="off"
              placeholder="Search the web or documentation..."
              aria-label="Search the web"
            />
          </form>
        </div>

        <section class="quick-links" aria-label="Quick links">
          <h2>Quick Links</h2>
          <div class="quick-grid">
            <button class="quick-link" type="button" data-url="https://github.com/">
              <span class="material-symbols-outlined">code</span>
              <span>GitHub</span>
            </button>
            <button class="quick-link" type="button" data-url="https://developer.mozilla.org/">
              <span class="material-symbols-outlined">description</span>
              <span>MDN Docs</span>
            </button>
            <button class="quick-link" type="button" data-url="https://stackoverflow.com/">
              <span class="material-symbols-outlined">forum</span>
              <span>Stack Overflow</span>
            </button>
            <button class="quick-link" type="button" data-url="https://web.dev/">
              <span class="material-symbols-outlined">school</span>
              <span>Web.dev</span>
            </button>
          </div>
        </section>
      </section>
    </div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
